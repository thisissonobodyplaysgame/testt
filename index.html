<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunshine OS</title> 

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
    cursor: none;
    background: url('https://4kwallpapers.com/images/walls/thumbs_3t/22088.jpg') no-repeat center center fixed;
    background-size: cover;
}

#startup {
    position: fixed;
    inset: 0;
    background: linear-gradient(to top, #1a001f, #ff5e62, #ff9966);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 200000;
}

.sun {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffd27f, #ff7e5f);
    box-shadow: 0 0 60px rgba(255,150,100,0.8);
    animation: sunRise 2.5s ease forwards;
}

.start-text {
    margin-top: 30px;
    font-size: 28px;
    letter-spacing: 4px;
    opacity: 0;
    animation: fadeInText 1.5s ease forwards;
    animation-delay: 0.8s;
}

.enter-btn {
    margin-top: 40px;
    padding: 12px 28px;
    border-radius: 999px;
    border: none;
    font-size: 14px;
    letter-spacing: 2px;
    background: rgba(255,255,255,0.15);
    color: white;
    backdrop-filter: blur(10px);
    opacity: 0;
    animation: fadeInText 1.5s ease forwards;
    animation-delay: 1.6s;
}

@keyframes sunRise {
    from { transform: translateY(200px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes fadeInText {
    to { opacity: 1; }
}

@keyframes fadeOutStartup {
    to { opacity: 0; visibility: hidden; }
}

#cursor {
    width: 14px;
    height: 14px;
    background: white;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 300000;
    transform: translate(-50%, -50%);
}

.time {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 96px;
}

.day {
    position: absolute;
    top: 62%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
}

.dock {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 14px;
    padding: 10px 14px;
    border-radius: 14px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
}

.app {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background-size: cover;
    background-position: center;
    background-color: rgba(255,255,255,0.1);
    transition: 0.2s ease;
}

.app:hover {
    transform: scale(1.15);
}

.fullscreen-app {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    z-index: 100000;
}

.fullscreen-app.show {
    display: block;
}

.fullscreen-app iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.close-btn {
    position: absolute;
    top: 12px;
    right: 14px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 10px;
}
</style>
</head>
<body>

<div id="startup">
    <div class="sun"></div>
    <div class="start-text">SUNSHINE OS</div>
    <button class="enter-btn" onclick="enterOS()">ENTER</button>
</div>

<div class="time" id="time"></div>
<div class="day" id="day"></div>

<script>
function enterOS() {
    const startup = document.getElementById("startup");
    startup.style.animation = "fadeOutStartup 1s ease forwards";
    setTimeout(() => startup.style.display = "none", 1000);
}

const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});

function updateTime() {
    const now = new Date();
    document.getElementById("time").textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    document.getElementById("day").textContent = now.toLocaleDateString([], { weekday: 'long' }).toUpperCase();
}
setInterval(updateTime, 1000);
updateTime();

const apps = document.querySelectorAll('.app');
apps.forEach(app => {
    app.addEventListener('click', () => {
        const id = app.dataset.app;

        // External apps
        if(id === 'netflix') return window.open('https://mathiscoolz.b-cdn.net/');
        if(id === 'google') return window.open('http://blockedmath.b-cdn.net/#home');
        if(id === 'spotify') return window.open('https://learningisnotfun.b-cdn.net');
        if(id === 'nowgg') return window.open('https://flux-math.b-cdn.net/embed.html?url=https://nowgg.fun');

        // Hide all other fullscreen apps
        document.querySelectorAll('.fullscreen-app.show').forEach(w => {
            const iframe = w.querySelector("iframe");
            iframe.src = iframe.src; // Reset iframe
            w.classList.remove('show');
        });

        // Show selected app
        const appWindow = document.getElementById(id);
        if(appWindow) appWindow.classList.add('show');
    });
});

document.querySelectorAll('.close-btn').forEach(btn => {
    btn.onclick = () => {
        const win = btn.parentElement;
        const iframe = win.querySelector("iframe");
        iframe.src = iframe.src; // Reset iframe on close
        win.classList.remove('show');
    };
});
</script>
